version: '3.9'

services:
  redis:
      image: redis:7-alpine
      container_name: rbac_auth_redis
      command: redis-server --requirepass ${REDIS_PASSWORD}
      environment:
        - REDIS_PASSWORD=${REDIS_PASSWORD}
      ports:
        - "6379:6379"
      volumes:
        - redis_data:/data
      restart: unless-stopped
      healthcheck:
        test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s

  db:
    image: postgres:16
    container_name: rbac_auth_db
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: rbac_auth_backend
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      - SEED_ON_STARTUP=false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
